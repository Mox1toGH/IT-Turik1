<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80d6ff" />
      <stop offset="50%" stop-color="#b76bff" />
      <stop offset="100%" stop-color="#4fffb0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="180" height="180" rx="50" ry="50" fill="none" stroke="url(#pulseGradient)" stroke-width="14" filter="url(#glow)">
    <animate attributeName="stroke-width" values="10;18;10" dur="3s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="10s" repeatCount="indefinite" />
  </rect>
  <rect x="24" y="24" width="152" height="152" rx="40" ry="40" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="4" />
</svg>
